name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  TERRAFORM_DIR: terraform
  IMAGE_NAME: threat-modelling-tool
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_VAR_api_key: ${{ secrets.API_KEY }}

concurrency:
  group: terraform-production
  cancel-in-progress: true

jobs:
  build-and-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -lock-timeout=10m

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      # Save the plan to a file so apply uses the same plan
      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -lock-timeout=10m -input=false -out=tfplan
        env:
          TF_VAR_azs: '["eu-west-2a","eu-west-2b"]'
          TF_VAR_container_image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest'
          TF_VAR_region: 'eu-west-2'
          TF_VAR_vpc_cidr: '10.0.0.0/16'
          TF_VAR_domain_name: '${{ secrets.DOMAIN_NAME }}'

      # Pass the plan file to the apply job
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 1

      - name: Cleanup Terraform Lock
        if: always()
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: rm -f .terraform.tfstate.lock.info

  # Manual approval gate via Required reviewers. Triggered by environment being set to production
  apply:
    runs-on: ubuntu-latest
    needs: build-and-plan
    environment: production        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -lock-timeout=10m

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TERRAFORM_DIR }}

      # Applies the exact plan that was reviewed
      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -lock-timeout=10m -input=false tfplan

      - name: Cleanup Terraform Lock
        if: always()
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: rm -f .terraform.tfstate.lock.info