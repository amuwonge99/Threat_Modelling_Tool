#
name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  AWS_REGION: eu-west-2
  TERRAFORM_DIR: terraform
  IMAGE_NAME: threat-modelling-tool
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_VAR_api_key: ${{ secrets.API_KEY }}

concurrency:
  group: terraform-production
  cancel-in-progress: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Run tests (optional)
      - name: Run Tests
        run: npm test

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      # Push Docker image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Terraform Init
      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -lock-timeout=10m

      # Terraform Validate
      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      # Terraform Plan
      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -lock-timeout=10m
        env:
          TF_VAR_azs: '["eu-west-2a","eu-west-2b"]'
          TF_VAR_container_image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest'

      # Cleanup stale Terraform lock if job is cancelled/fails
      - name: Cleanup Terraform Lock
        if: always()
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          rm -f .terraform.tfstate.lock.info

  
